<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent Chat</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Inter, sans-serif;
}

body{
    height:100vh;
    display:flex;
    background:#f5f7fb;
}

/* Sidebar */

.sidebar{
    width:280px;
    background:#111827;
    color:white;
    display:flex;
    flex-direction:column;
}

.logo{
    padding:20px;
    font-size:24px;
    font-weight:700;
    border-bottom:1px solid rgba(255,255,255,.1);
}

.new-chat{
    margin:20px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#4f46e5;
    color:white;
    cursor:pointer;
}

.history{
    flex:1;
    overflow:auto;
}

.history-item{
    padding:15px 20px;
    cursor:pointer;
    transition:.3s;
}

.history-item:hover{
    background:#1f2937;
}

/* Chat Area */

.chat-wrapper{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* Header */

.chat-header{
    height:80px;
    background:white;
    border-bottom:1px solid #ddd;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 25px;
}

.agent-info{
    display:flex;
    gap:15px;
    align-items:center;
}

.agent-avatar{
    width:50px;
    height:50px;
    border-radius:50%;
    background:#4f46e5;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    font-weight:bold;
}

.agent-role{
    color:#6b7280;
    font-size:14px;
}

.status{
    color:#10b981;
    font-size:14px;
}

/* Chat Body */

.chat-body{
    flex:1;
    overflow-y:auto;
    padding:30px;
    display:flex;
    flex-direction:column;
    gap:20px;
}

/* Message */

.message{
    display:flex;
    gap:12px;
    max-width:75%;
}

.message.user{
    align-self:flex-end;
    flex-direction:row-reverse;
}

.message.agent{
    align-self:flex-start;
}

.avatar{
    width:40px;
    height:40px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-weight:bold;
}

.user .avatar{
    background:#2563eb;
}

.agent .avatar{
    background:#4f46e5;
}

.bubble{
    padding:15px 18px;
    border-radius:16px;
    line-height:1.6;
}

.user .bubble{
    background:#2563eb;
    color:white;
}

.agent .bubble{
    background:white;
    border:1px solid #e5e7eb;
}

/* Thinking */

.thinking{
    display:flex;
    align-items:center;
    gap:10px;
    color:#6b7280;
    font-size:14px;
}

.dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#6b7280;
    animation:bounce 1s infinite;
}

.dot:nth-child(2){
    animation-delay:.2s;
}

.dot:nth-child(3){
    animation-delay:.4s;
}

@keyframes bounce{
    0%,80%,100%{
        transform:scale(0);
    }
    40%{
        transform:scale(1);
    }
}

/* Input */

.chat-input{
    background:white;
    border-top:1px solid #ddd;
    padding:20px;
}

.input-wrapper{
    display:flex;
    gap:15px;
}

textarea{
    flex:1;
    height:70px;
    resize:none;
    padding:15px;
    border:1px solid #ddd;
    border-radius:12px;
    outline:none;
}

.send-btn{
    width:120px;
    border:none;
    background:#4f46e5;
    color:white;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
}

.send-btn:hover{
    background:#4338ca;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);

    display:none;
    justify-content:center;
    align-items:center;

    z-index:9999;
}

.modal.show{
    display:flex;
}

.modal-content{
    width:500px;
    background:white;
    border-radius:16px;
    padding:30px;
}

.modal-content h2{
    margin-bottom:10px;
}

.modal-content p{
    color:#6b7280;
    margin-bottom:20px;
}

.modal-content form{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.modal-content input{
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
}

.modal-content button{
    padding:14px;
    border:none;
    border-radius:10px;
    background:#4f46e5;
    color:white;
    cursor:pointer;
    font-weight:600;
}

</style>
</head>
<body>

<!-- Sidebar -->

<div class="sidebar">

    <div class="logo">
        AI CRM
    </div>

    <button class="new-chat">
        + Cuộc hội thoại mới
    </button>

    <div class="history">

        <div class="bubble" id="customerInfo">
        <h3>Thông tin khách hàng</h3>

        <p><strong>Họ tên:</strong> <span id="">-</span></p>

        <p><strong>Email:</strong> <span id="">-</span></p>

        <p><strong>Số điện thoại:</strong> <span id="">-</span></p>

        <p><strong>Công ty:</strong> <span id="">-</span></p>

        <p><strong>Trạng thái:</strong> <span id="">-</span></p>
    </div>

    </div>

</div>

<!-- Chat -->

<div class="chat-wrapper">

    <div class="chat-header">

        <div class="agent-info">

            <div class="agent-avatar">
                AI
            </div>

            <div>
                <h3>Sales Agent</h3>
                <div class="agent-role">
                    Gemini 2.5 Flash
                </div>
            </div>

        </div>

        <div class="status">
            ● Online
        </div>

    </div>

    <div class="chat-body" id="chatBody">

        <!-- User -->

        <div class="message user">

            <div class="avatar">
                U
            </div>

            <div class="bubble">
                <!-- Tôi muốn triển khai chatbot AI cho CRM của công ty. -->
            </div>

        </div>

        <!-- Agent -->

        <div class="message agent">

            <div class="avatar">
                AI
            </div>

            <div class="bubble">
                <!-- Tôi có thể hỗ trợ anh/chị xây dựng chatbot CRM với các chức năng:
                <br><br>

                • Tư vấn khách hàng tự động
                <br>
                • Phân loại lead
                <br>
                • Phân tích cảm xúc khách hàng
                <br>
                • Gợi ý chăm sóc khách hàng
                <br>
                • Tích hợp CRM nội bộ -->
            </div>

        </div>

        <!-- Thinking -->

        <div class="message agent">

            <div class="avatar">
                AI
            </div>

            <div class="bubble">

                <!-- <div class="thinking">

                    Đang suy nghĩ

                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>

                </div> -->

            </div>

        </div>

    </div>

    <div class="chat-input">

        <div class="input-wrapper">

            <textarea 
                id="messageInput"
                placeholder="Nhập tin nhắn..."
            ></textarea>

            <button id="sendBtn" class="send-btn">
                Gửi
            </button>

        </div>

    </div>

</div>
<!-- Customer Modal -->

<div id="customerModal" class="modal">

    <div class="modal-content">

        <h2>Thông tin khách hàng</h2>

        <p>
            Vui lòng nhập thông tin trước khi bắt đầu trò chuyện
        </p>

        <form>

            <input
                type="text"
                id="customerName"
                placeholder="Họ và tên"
                required
            >

            <input
                type="text"
                id="customerPhone"
                placeholder="Số điện thoại"
                required
            >

            <input
                type="email"
                id="customerEmail"
                placeholder="Email"
            >

            <button type="button" id="createCustomer">
                Bắt đầu trò chuyện
            </button>

        </form>

    </div>

</div>
</body>

<script>
const modal = document.getElementById("customerModal");

let visitorId = localStorage.getItem("visitor_id");
// let visitorId = "0b74856e-8d29-49e3-8a73-3a4f0be1f3c3";

if (!visitorId) {
    visitorId = crypto.randomUUID();
    localStorage.setItem("visitor_id", visitorId);
}

let isSending = false;

function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}

async function check_visitor(visitorId) {

    try {

        const response = await fetch(
            `/api/check_visitor/${visitorId}`,
            {
                method: "GET",
                headers: {
                    "Content-Type": "application/json"
                }
            }
        );

        if (!response.ok) {
            modal.classList.add("show");
        } else {
            modal.classList.remove("show");
        }

    } catch (error) {
        console.error(error);
    }
}

document.addEventListener("DOMContentLoaded", () => {

    check_visitor(visitorId);

    get_messages(visitorId);

    const createCustomer =
        document.getElementById("createCustomer");

    createCustomer.addEventListener(
        "click",
        create_customer
    );

    document
        .getElementById("sendBtn")
        .addEventListener(
            "click",
            sendMessage
        );

    document
        .getElementById("messageInput")
        .addEventListener(
            "keydown",
            function (e) {

                if (
                    e.key === "Enter" &&
                    !e.shiftKey
                ) {
                    e.preventDefault();
                    sendMessage();
                }
            }
        );
});

async function create_customer(event) {

    event.preventDefault();

    try {

        const response = await fetch(
            "/api/create_customer_front",
            {
                method: "POST",
                headers: {
                    "Content-Type":
                        "application/json"
                },
                body: JSON.stringify({
                    visitor_id: visitorId,
                    name:
                        document.getElementById(
                            "customerName"
                        ).value,
                    phone:
                        document.getElementById(
                            "customerPhone"
                        ).value,
                    email:
                        document.getElementById(
                            "customerEmail"
                        ).value
                })
            }
        );

        const data =
            await response.json();

        if (response.ok) {

            modal.classList.remove(
                "show"
            );

            console.log(
                "Tạo customer thành công",
                data
            );
        }

    } catch (error) {
        console.error(error);
    }
}

async function get_messages(visitor_id) {

    try {

        const response = await fetch(
            `/api/get_list_messages/${visitor_id}`
        );

        if (!response.ok) {
            throw new Error(
                `HTTP ${response.status}`
            );
        }

        const data =
            await response.json();

        data.reverse();

        const chatBody =
            document.getElementById(
                "chatBody"
            );

        chatBody.innerHTML = "";

        data.forEach(msg => {

            appendMessage(
                msg.sender,
                msg.content
            );
        });

    } catch (error) {

        console.error(
            "Lỗi lấy tin nhắn:",
            error
        );
    }
}

function appendMessage(
    sender,
    content
) {

    const chatBody =
        document.getElementById(
            "chatBody"
        );

    let html = "";

    if (sender === "customer") {

        html = `
            <div class="message user">

                <div class="avatar">
                    U
                </div>

                <div class="bubble">
                    ${escapeHtml(content)}
                </div>

            </div>
        `;
    }

    if (sender === "ai") {

        html = `
            <div class="message agent">

                <div class="avatar">
                    AI
                </div>

                <div class="bubble">
                    ${escapeHtml(content)}
                </div>

            </div>
        `;
    }

    chatBody.insertAdjacentHTML(
        "beforeend",
        html
    );

    chatBody.scrollTop =
        chatBody.scrollHeight;
}

function showThinking() {

    const chatBody =
        document.getElementById(
            "chatBody"
        );

    const html = `
        <div
            class="message agent"
            id="thinkingMessage"
        >

            <div class="avatar">
                AI
            </div>

            <div class="bubble">

                <div class="thinking">

                    Đang suy nghĩ

                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>

                </div>

            </div>

        </div>
    `;

    chatBody.insertAdjacentHTML(
        "beforeend",
        html
    );

    chatBody.scrollTop =
        chatBody.scrollHeight;
}

function removeThinking() {

    const thinking =
        document.getElementById(
            "thinkingMessage"
        );

    if (thinking) {
        thinking.remove();
    }
}

async function sendMessage() {

    if (isSending) {
        return;
    }

    const input =
        document.getElementById(
            "messageInput"
        );

    const content =
        input.value.trim();

    if (!content) {
        return;
    }

    isSending = true;

    appendMessage(
        "customer",
        content
    );

    input.value = "";

    showThinking();

    try {

        const response =
            await fetch(
                "/api/generate/",
                {
                    method: "POST",
                    headers: {
                        "Content-Type":
                            "application/json"
                    },
                    body: JSON.stringify({
                        visitor_id:
                            visitorId,
                        question:
                            content
                    })
                }
            );

        const data =
            await response.json();

        removeThinking();

        appendMessage(
            "ai",
            data.message
        );

    } catch (error) {

        removeThinking();

        appendMessage(
            "ai",
            "Xin lỗi, hệ thống đang bận."
        );

        console.error(error);

    } finally {

        isSending = false;
    }
}
</script>
</html>

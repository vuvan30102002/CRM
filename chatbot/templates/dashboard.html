    <meta charset="UTF-8">

<body>

    <!-- Search -->

    <!-- Table -->

            <tbody id="customerTable">
                
            </tbody>

        </table>

        <nav>
            <ul class="pagination justify-content-end">

                <li class="page-item">
                    <a class="page-link" href="#">

                    <a class="page-link" href="#">

                    <a class="page-link" href="#">

</html>
<script>

const token = localStorage.getItem("access_token");

if (!token) {
    window.location.href = "/api/login_view";
}

let currentPage = 1;
const pageSize = 10;

async function refreshAccessToken() {

    const refreshToken =
        localStorage.getItem("refresh_token");

    const response = await fetch(
        "/api/token/refresh/",
        {
            method: "POST",
            headers: {
                "Content-Type":
                    "application/json"
            },
            body: JSON.stringify({
                refresh: refreshToken
            })
        }
    );

    if (!response.ok) {
        throw new Error(
            "Refresh token hết hạn"
        );
    }

    const data = await response.json();

    localStorage.setItem(
        "access_token",
        data.access
    );

    return data.access;
}

document
.getElementById("logoutBtn")
.addEventListener("click", function () {

    localStorage.removeItem(
        "access_token"
    );

    localStorage.removeItem(
        "refresh_token"
    );

    window.location.href =
        "/api/login_view";
});


async function loadCustomers(page = 1) {

    try {

        currentPage = page;

        let accessToken =
            localStorage.getItem(
                "access_token"
            );

        let response = await fetch(
            `/api/get_list_customer?page=${page}`,
            {
                method: "GET",
                headers: {
                    "Authorization":
                        `Bearer ${accessToken}`,
                    "Content-Type":
                        "application/json"
                }
            }
        );

        if (response.status === 401) {

            accessToken =
                await refreshAccessToken();

            response = await fetch(
                `/api/get_list_customer?page=${page}`,
                {
                    method: "GET",
                    headers: {
                        "Authorization":
                            `Bearer ${accessToken}`,
                        "Content-Type":
                            "application/json"
                    }
                }
            );
        }

        if (!response.ok) {
            throw new Error(
                `HTTP Error ${response.status}`
            );
        }

        const data =
            await response.json();

        const role = data.role;

        const customers =
            data.results;

        const totalItems =
            data.count;

        renderTable(
            customers,
            role
        );

        renderPagination(
            totalItems,
            currentPage
        );

    } catch (error) {

        console.error(error);

        localStorage.removeItem(
            "access_token"
        );

        localStorage.removeItem(
            "refresh_token"
        );

        window.location.href =
            "/api/login_view";
    }
}


function renderTable(
    customers,
    role
) {

    const table =
        document.getElementById(
            "customerTable"
        );

    table.innerHTML = "";

    customers.forEach(
        (customer, index) => {

            let actionButtons = "";

            if (
                role === "admin" ||
                role === "manager"
            ) {

                actionButtons = `
                    <td>
                        <button class="btn btn-sm btn-info viewBtn" data-id = "${customer.id}">
                            <a class="page-link" href="/api/assignment/${customer.id}">
                                Phân công
                            </a>
                        </button>

                        <button class="btn btn-sm btn-warning">
                            <a class="page-link" href="/api/update_view/${customer.id}">
                                Sửa
                            </a>
                        </button>

                        <button class="btn btn-sm btn-danger deleteBtn" data-id = "${customer.id}">
                                Xóa
                        </button>
                        
                    </td>
                `;
            }
            else{
                actionButtons = `
                    <td>
                        <button class="btn btn-sm btn-info viewBtn" data-id = "${customer.id}">
                            <a class="page-link" href="/api/task_by_id/${customer.id}">
                                Xem
                            </a>
                        </button>
                    </td>
                `;
            }

            table.innerHTML += `
                <tr>
                    <td>${customer.id}</td>
                    <td>${customer.name}</td>
                    <td>${customer.email}</td>
                    <td>${customer.phone}</td>
                    <td>${customer.source}</td>
                    <td>${customer.status}</td>
                    <td>${customer.assigned_role}</td>

                    ${actionButtons}
                </tr>
            `;
        }
    );
}


function renderPagination(
    totalItems,
    currentPage
) {

    const totalPages =
        Math.ceil(
            totalItems / pageSize
        );

    const pagination =
        document.querySelector(
            ".pagination"
        );

    let html = "";

    html += `
        <li class="page-item ${
            currentPage === 1
                ? "disabled"
                : ""
        }">

            <a
                href="#"
                class="page-link"
                onclick="loadCustomers(${currentPage - 1}); return false;"
            >
                Previous
            </a>

        </li>
    `;

    for (
        let i = 1;
        i <= totalPages;
        i++
    ) {

        html += `
            <li class="page-item ${
                currentPage === i
                    ? "active"
                    : ""
            }">

                <a
                    href="#"
                    class="page-link"
                    onclick="loadCustomers(${i}); return false;"
                >
                    ${i}
                </a>

            </li>
        `;
    }

    html += `
        <li class="page-item ${
            currentPage === totalPages
                ? "disabled"
                : ""
        }">

            <a
                href="#"
                class="page-link"
                onclick="loadCustomers(${currentPage + 1}); return false;"
            >
                Next
            </a>

        </li>
    `;

    pagination.innerHTML = html;
}


loadCustomers(1);

document.addEventListener("click", function(event){
    if (event.target.classList.contains("deleteBtn")){
        const customerId = event.target.dataset.id;
        deleteCustomer(customerId);
    }
})

async function deleteCustomer(id){
    const response = await fetch(`/api/delete_customer/${id}`,{
        method: "DELETE",
        headers: {
            Authorization:
                `Bearer ${localStorage.getItem("access_token")}`
        }
    })
    if(response.ok){
        alert("Xóa thành công");
        loadCustomers(currentPage);
    }
}


</script>
